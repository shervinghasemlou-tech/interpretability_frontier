description: Submission-ready balanced run with stronger coverage, full splits on core evaluation datasets, and capped instruction/chat sets.
models:
  - registry_key: qwen25_05b_base
    enabled: true
  - registry_key: qwen25_05b_instruct
    enabled: true
  - registry_key: smollm2_360m_base
    enabled: true
  - registry_key: smollm2_360m_instruct
    enabled: true
  - registry_key: pythia_410m
    enabled: true
  - registry_key: pythia_410m_deduped
    enabled: true

datasets:
  - registry_key: wikitext103_validation
    enabled: true
    use_full_split: true
  - registry_key: hellaswag_validation
    enabled: true
    use_full_split: true
  - registry_key: piqa_validation
    enabled: true
    use_full_split: true
  - registry_key: arc_easy_validation
    enabled: true
    use_full_split: true
  - registry_key: arc_challenge_validation
    enabled: true
    use_full_split: true
  - registry_key: gsm8k_test
    enabled: true
    use_full_split: true
  - registry_key: alpaca_train
    enabled: true
    num_samples: 5000
  - registry_key: ultrachat_train_sft
    enabled: true
    num_samples: 5000
  - registry_key: handcrafted_diagnostics
    enabled: true
    use_full_split: true

sweep:
  seeds: [0, 1, 2]
  interpreter_sizes: [64, 128]
  limit_layers: 4
  limit_heads: 8
  mechanism_types: [attention_probs, attention_top1, attention_entropy]
  interpreter_arches: [transformer, mlp]
  controls: [none, label_shuffle, random_target]
  cross_family_splits:
    - name: all_to_all
      train_families: [ALL]
      eval_families: [ALL]
    - name: factual_to_reasoning
      train_families: [wikitext, hellaswag, piqa, arc-challenge, arc-easy]
      eval_families: [gsm8k, reasoning_like]
    - name: natural_to_pattern
      train_families: [wikitext, hellaswag, piqa, arc-challenge, arc-easy, gsm8k, alpaca, ultrachat]
      eval_families: [pattern, repeated_span]
  dataset_scaling:
    enabled: true
    train_sizes: [32, 64, 128, 256, 512]
    stratify_by_family: true
    eval_uses_full_validation: true

training:
  behavior_steps: 1000
  mechanism_steps: 400
  batch_size: 4
  lr: 0.0003
  weight_decay: 0.01
  max_prompt_len: 128
  interpreter_layers: 2
  interpreter_heads: 4
  dropout: 0.0

outputs:
  root_dir: outputs
  run_name: submit_ready_balanced
  save_checkpoints: true
  save_plots: true
  save_per_example_artifacts: true
  save_model_cards: true
  save_markdown_report: true
  save_latex_tables: true
  save_submission_bundle: true

stats:
  bootstrap_iterations: 2000
  confidence_level: 0.95
  fdr_method: bh
  primary_metrics: [mean_gap, p90_gap, frac_hard_heads]

runtime:
  device: auto
  allow_fp16: true
  trust_remote_code: true
  compile_interpreters: false

self_reflection:
  enabled: true
  modes: [self_probe_behavior, self_probe_mechanism, self_report_behavior, self_report_mechanism]
  probe_arches: [linear, mlp]
  probe_sizes: [64, 128]
  probe_steps: 200
  report_num_examples: 64
  report_max_new_tokens: 8
  report_temperature: 0.0
