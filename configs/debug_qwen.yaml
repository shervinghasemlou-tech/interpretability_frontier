description: Quick smoke test on one strong compact base model.
models:
  - registry_key: qwen25_05b_base
    enabled: true

datasets:
  - registry_key: handcrafted_diagnostics
    enabled: true
    num_samples: 48
  - registry_key: wikitext103_validation
    enabled: true
    num_samples: 16

sweep:
  seeds: [0]
  interpreter_sizes: [64]
  limit_layers: 4
  limit_heads: 8
  mechanism_types: [attention_probs]
  interpreter_arches: [transformer]
  controls: [none]

training:
  behavior_steps: 150
  mechanism_steps: 80
  batch_size: 4
  lr: 0.0003
  weight_decay: 0.01
  max_prompt_len: 96
  interpreter_layers: 2
  interpreter_heads: 4
  dropout: 0.0
  behavior_objective: kl_distill

outputs:
  root_dir: outputs
  run_name: debug_qwen
  save_checkpoints: true
  save_plots: true
  save_per_example_artifacts: true
  save_model_cards: true

stats:
  bootstrap_iterations: 100
  confidence_level: 0.95
  fdr_method: bh
  primary_metrics: [mean_gap, p90_gap, frac_hard_heads]

runtime:
  device: auto
  allow_fp16: true
  trust_remote_code: true
  compile_interpreters: false
