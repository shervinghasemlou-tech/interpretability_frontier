description: tiny smoke run for 8GB GPU
models:
  - registry_key: smollm2_360m_base
    enabled: true

datasets:
  - registry_key: handcrafted_diagnostics
    enabled: true
    num_samples: 16

sweep:
  seeds: [0]
  interpreter_sizes: [64]
  limit_layers: 2
  limit_heads: 4
  mechanism_types: [attention_probs]
  interpreter_arches: [transformer]
  controls: [none]

training:
  behavior_steps: 40
  mechanism_steps: 20
  batch_size: 1
  lr: 0.0003
  weight_decay: 0.01
  max_prompt_len: 48
  interpreter_layers: 1
  interpreter_heads: 4
  dropout: 0.0
  behavior_objective: kl_distill

outputs:
  root_dir: outputs
  run_name: tiny_smoke
  save_checkpoints: false
  save_plots: true
  save_per_example_artifacts: false
  save_model_cards: false

stats:
  bootstrap_iterations: 20
  confidence_level: 0.95
  fdr_method: bh
  primary_metrics: [mean_gap]

runtime:
  device: auto
  allow_fp16: true
  trust_remote_code: true
  compile_interpreters: false
  low_cpu_mem_usage: true
  load_in_8bit: false
  load_in_4bit: false
  device_map: null
