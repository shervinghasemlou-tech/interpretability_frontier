description: Multimodel self-reflection ablation over compact OSS base/instruct pairs.
models:
  - registry_key: qwen25_05b_base
    enabled: true
  - registry_key: qwen25_05b_instruct
    enabled: true
  - registry_key: smollm2_360m_base
    enabled: true
  - registry_key: smollm2_360m_instruct
    enabled: true

datasets:
  - registry_key: handcrafted_diagnostics
    enabled: true
    num_samples: 48
  - registry_key: hellaswag_validation
    enabled: true
    num_samples: 48

sweep:
  seeds: [0, 1]
  interpreter_sizes: [64]
  limit_layers: 2
  limit_heads: 4
  mechanism_types: [attention_probs, attention_top1]
  interpreter_arches: [transformer]
  controls: [none]
  cross_family_splits:
    - name: all_to_all
      train_families: [ALL]
      eval_families: [ALL]
  dataset_scaling:
    enabled: false

training:
  behavior_steps: 120
  mechanism_steps: 80
  batch_size: 1
  lr: 0.0003
  weight_decay: 0.01
  max_prompt_len: 96
  interpreter_layers: 1
  interpreter_heads: 4
  dropout: 0.0

self_reflection:
  enabled: true
  modes: [self_probe_behavior, self_probe_mechanism, self_report_behavior, self_report_mechanism]
  probe_arches: [linear, mlp]
  probe_sizes: [64, 128]
  probe_steps: 80
  report_num_examples: 16
  report_max_new_tokens: 8
  report_temperature: 0.0

outputs:
  root_dir: outputs
  run_name: self_reflection_multimodel
  save_checkpoints: true
  save_plots: true
  save_per_example_artifacts: true
  save_model_cards: true

stats:
  bootstrap_iterations: 200
  confidence_level: 0.95
  fdr_method: bh
  primary_metrics: [mean_gap, frac_hard_heads]

runtime:
  device: auto
  allow_fp16: true
  trust_remote_code: true
  compile_interpreters: false
  load_in_8bit: true
  device_map: auto

validation:
  min_num_rows: 16
  self_report_min_parsed_ok: 0.8
  self_report_min_exact_match_to_target: 0.2
  self_report_min_exact_match_to_gold: 0.2
  self_report_mechanism_min_within_one: 0.35
  promote_only_validated_optional: true
