description: Debug cross-family generalization on one model.
models:
  - registry_key: qwen25_05b_base
    enabled: true

datasets:
  - registry_key: handcrafted_diagnostics
    enabled: true
    num_samples: 64
  - registry_key: hellaswag_validation
    enabled: true
    num_samples: 24
  - registry_key: piqa_validation
    enabled: true
    num_samples: 24

sweep:
  seeds: [0]
  interpreter_sizes: [64]
  limit_layers: 4
  limit_heads: 8
  mechanism_types: [attention_probs]
  interpreter_arches: [transformer]
  controls: [none]
  cross_family_splits:
    - name: all_to_all
      train_families: [ALL]
      eval_families: [ALL]
    - name: factual_to_mcq
      train_families: [wikitext, factual]
      eval_families: [hellaswag, piqa, arc-challenge, arc-easy]
    - name: mcq_to_reasoning
      train_families: [hellaswag, piqa, arc-challenge, arc-easy]
      eval_families: [gsm8k, reasoning_like]

training:
  behavior_steps: 250
  mechanism_steps: 100
  batch_size: 4
  lr: 0.0003
  weight_decay: 0.01
  max_prompt_len: 128
  interpreter_layers: 2
  interpreter_heads: 4
  dropout: 0.0
  behavior_objective: restricted_choice_eval

outputs:
  root_dir: outputs
  run_name: debug_cross_family
  save_checkpoints: true
  save_plots: true
  save_per_example_artifacts: true
  save_model_cards: true

stats:
  bootstrap_iterations: 100
  confidence_level: 0.95
  fdr_method: bh
  primary_metrics: [mean_gap, p90_gap, frac_hard_heads]

runtime:
  device: auto
  allow_fp16: true
  trust_remote_code: true
  compile_interpreters: false
