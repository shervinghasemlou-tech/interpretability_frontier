description: Debugging run across a few representative model families.
models:
  - registry_key: qwen25_05b_base
    enabled: true
  - registry_key: smollm2_360m_base
    enabled: true
  - registry_key: pythia_410m_deduped
    enabled: true

datasets:
  - registry_key: handcrafted_diagnostics
    enabled: true
    num_samples: 64
  - registry_key: hellaswag_validation
    enabled: true
    num_samples: 24

sweep:
  seeds: [0]
  interpreter_sizes: [64]
  limit_layers: 4
  limit_heads: 8
  mechanism_types: [attention_probs, attention_top1]
  interpreter_arches: [transformer, mlp]
  controls: [none, label_shuffle]

training:
  behavior_steps: 200
  mechanism_steps: 100
  batch_size: 4
  lr: 0.0003
  weight_decay: 0.01
  max_prompt_len: 96
  interpreter_layers: 2
  interpreter_heads: 4
  dropout: 0.0
  behavior_objective: kl_distill

outputs:
  root_dir: outputs
  run_name: debug_multimodel
  save_checkpoints: true
  save_plots: true
  save_per_example_artifacts: true
  save_model_cards: true

stats:
  bootstrap_iterations: 100
  confidence_level: 0.95
  fdr_method: bh
  primary_metrics: [mean_gap, p90_gap, frac_hard_heads]

runtime:
  device: auto
  allow_fp16: true
  trust_remote_code: true
  compile_interpreters: false
