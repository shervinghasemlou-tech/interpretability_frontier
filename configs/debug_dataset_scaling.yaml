description: Debug dataset-size scaling with proper MCQ evaluation.
models:
  - registry_key: qwen25_05b_base
    enabled: true

datasets:
  - registry_key: hellaswag_validation
    enabled: true
    num_samples: 64
  - registry_key: piqa_validation
    enabled: true
    num_samples: 64
  - registry_key: arc_challenge_validation
    enabled: true
    num_samples: 64
  - registry_key: handcrafted_diagnostics
    enabled: true
    num_samples: 64

sweep:
  seeds: [0, 1]
  interpreter_sizes: [64]
  limit_layers: 4
  limit_heads: 8
  mechanism_types: [attention_probs]
  interpreter_arches: [transformer]
  controls: [none]
  cross_family_splits:
    - name: all_to_all
      train_families: [ALL]
      eval_families: [ALL]
  dataset_scaling:
    enabled: true
    train_sizes: [16, 32, 64]
    stratify_by_family: true
    eval_uses_full_validation: true

training:
  behavior_steps: 250
  mechanism_steps: 100
  batch_size: 4
  lr: 0.0003
  weight_decay: 0.01
  max_prompt_len: 128
  interpreter_layers: 2
  interpreter_heads: 4
  dropout: 0.0
  behavior_objective: restricted_choice_eval

outputs:
  root_dir: outputs
  run_name: debug_dataset_scaling
  save_checkpoints: true
  save_plots: true
  save_per_example_artifacts: true
  save_model_cards: true

stats:
  bootstrap_iterations: 100
  confidence_level: 0.95
  fdr_method: bh
  primary_metrics: [mean_gap, p90_gap, frac_hard_heads]

runtime:
  device: auto
  allow_fp16: true
  trust_remote_code: true
  compile_interpreters: false
