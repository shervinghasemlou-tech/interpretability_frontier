
description: Control and counterfactual ablations for reviewer-facing objections.
models:
  - registry_key: qwen25_05b_base
    enabled: true
  - registry_key: smollm2_360m_base
    enabled: true

datasets:
  - registry_key: handcrafted_diagnostics
    enabled: true
    num_samples: 64
  - registry_key: wikitext103_validation
    enabled: true
    num_samples: 32

sweep:
  seeds: [0, 1, 2]
  interpreter_sizes: [64]
  limit_layers: 4
  limit_heads: 8
  mechanism_types: [attention_probs]
  interpreter_arches: [transformer, mlp, position_only]
  controls: [none, label_shuffle, random_target, diagonal_baseline, causal_uniform]

training:
  behavior_steps: 500
  mechanism_steps: 250
  batch_size: 4
  lr: 0.0003
  weight_decay: 0.01
  max_prompt_len: 96
  interpreter_layers: 2
  interpreter_heads: 4
  dropout: 0.0

outputs:
  root_dir: outputs
  run_name: counterfactual_controls
  save_checkpoints: true
  save_plots: true
  save_per_example_artifacts: false

stats:
  bootstrap_iterations: 1000
  confidence_level: 0.95
  fdr_method: bh
  primary_metrics: [mean_gap, p90_gap, frac_hard_heads]

runtime:
  device: auto
  allow_fp16: true
  trust_remote_code: true
  compile_interpreters: false
