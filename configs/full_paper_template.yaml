
description: Full paper template spanning all planned model families and OSS datasets.
models:
  - registry_key: qwen25_05b_base
    enabled: true
  - registry_key: qwen25_05b_instruct
    enabled: true
  - registry_key: smollm2_360m_base
    enabled: true
  - registry_key: smollm2_360m_instruct
    enabled: true
  - registry_key: openelm_450m_base
    enabled: true
  - registry_key: openelm_450m_instruct
    enabled: true
  - registry_key: danube3_500m_base
    enabled: true
  - registry_key: danube3_500m_chat
    enabled: true
  - registry_key: pythia_410m
    enabled: true
  - registry_key: pythia_410m_deduped
    enabled: true

datasets:
  - registry_key: wikitext103_validation
    enabled: true
    use_full_split: true
  - registry_key: hellaswag_validation
    enabled: true
    use_full_split: true
  - registry_key: piqa_validation
    enabled: true
    use_full_split: true
  - registry_key: arc_easy_validation
    enabled: true
    use_full_split: true
  - registry_key: arc_challenge_validation
    enabled: true
    use_full_split: true
  - registry_key: gsm8k_test
    enabled: true
    use_full_split: true
  - registry_key: alpaca_train
    enabled: true
    use_full_split: true
  - registry_key: ultrachat_train_sft
    enabled: true
    use_full_split: true
  - registry_key: handcrafted_diagnostics
    enabled: true
    use_full_split: true

sweep:
  seeds: [0, 1, 2, 3, 4]
  interpreter_sizes: [64, 128]
  limit_layers: -1
  limit_heads: -1
  mechanism_types: [attention_probs, attention_top1, attention_entropy]
  interpreter_arches: [transformer, mlp]
  controls: [none, label_shuffle, random_target]

training:
  behavior_steps: 1000
  mechanism_steps: 400
  batch_size: 4
  lr: 0.0003
  weight_decay: 0.01
  max_prompt_len: 128
  interpreter_layers: 2
  interpreter_heads: 4
  dropout: 0.0

outputs:
  root_dir: outputs
  run_name: full_paper_template
  save_checkpoints: true
  save_plots: true
  save_per_example_artifacts: true
  save_model_cards: true
  save_markdown_report: true
  save_latex_tables: true
  save_submission_bundle: true

stats:
  bootstrap_iterations: 2000
  confidence_level: 0.95
  fdr_method: bh
  primary_metrics: [mean_gap, p90_gap, frac_hard_heads]

runtime:
  device: auto
  allow_fp16: true
  trust_remote_code: true
  compile_interpreters: false

self_reflection:
  enabled: true
  modes: [self_probe_behavior, self_probe_mechanism, self_report_behavior, self_report_mechanism]
  probe_arches: [linear, mlp]
  probe_sizes: [64, 128]
  probe_steps: 200
  report_num_examples: 32
  report_max_new_tokens: 8
  report_temperature: 0.0

validation:
  min_num_rows: 16
  self_report_min_parsed_ok: 0.8
  self_report_min_exact_match_to_target: 0.2
  self_report_min_exact_match_to_gold: 0.2
  self_report_mechanism_min_within_one: 0.35
  promote_only_validated_optional: true
