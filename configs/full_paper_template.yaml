description: maximal paper-scale sweep with full splits, all heads/layers, cross-family transfer, dataset-size scaling, controls, and self-reflection

models:
  - registry_key: qwen2_5_0_5b_base
    enabled: true
  - registry_key: qwen2_5_0_5b_instruct
    enabled: true
  - registry_key: smollm2_360m_base
    enabled: true
  - registry_key: smollm2_360m_instruct
    enabled: true
  - registry_key: pythia_410m
    enabled: true
  - registry_key: pythia_410m_deduped
    enabled: true
  - registry_key: openelm_450m
    enabled: true
  - registry_key: openelm_450m_instruct
    enabled: true
  - registry_key: danube3_500m_base
    enabled: true
  - registry_key: danube3_500m_chat
    enabled: true

datasets:
  - registry_key: handcrafted_diagnostics
    enabled: true
    use_full_split: true

  - registry_key: wikitext
    enabled: true
    use_full_split: true

  - registry_key: hellaswag
    enabled: true
    use_full_split: true

  - registry_key: piqa
    enabled: true
    use_full_split: true

  - registry_key: arc_easy
    enabled: true
    use_full_split: true

  - registry_key: arc_challenge
    enabled: true
    use_full_split: true

  - registry_key: gsm8k
    enabled: true
    use_full_split: true

  - registry_key: alpaca
    enabled: true
    use_full_split: true

  - registry_key: ultrachat_200k
    enabled: true
    use_full_split: true

sweep:
  seeds: [0, 1, 2, 3, 4]

  interpreter_sizes: [64, 128]
  interpreter_arches:
    - transformer
    - mlp
    - linear

  mechanism_types:
    - attention_probs
    - attention_top1
    - attention_entropy

  controls:
    - none
    - shuffled_prompt_target
    - shuffled_head_id
    - randomized_target
    - position_only
    - uniform_attention_baseline

  limit_layers: -1
  limit_heads: -1

  # NEW: cross-family transfer
  cross_family_splits:
    - train_family: factual
      eval_family: factual
    - train_family: pattern
      eval_family: pattern
    - train_family: repeated_span
      eval_family: repeated_span
    - train_family: reasoning_like
      eval_family: reasoning_like
    - train_family: factual
      eval_family: reasoning_like
    - train_family: reasoning_like
      eval_family: factual
    - train_family: factual
      eval_family: pattern
    - train_family: pattern
      eval_family: factual
    - train_family: repeated_span
      eval_family: factual
    - train_family: factual
      eval_family: repeated_span
    - train_family: all_natural
      eval_family: pattern
    - train_family: all_natural
      eval_family: repeated_span
    - train_family: all_to_all
      eval_family: all_to_all

  # NEW: dataset-size scaling
  dataset_scaling:
    enabled: true
    train_sizes: [32, 64, 128, 256, 512, 1024]
    eval_full_split: true

training:
  behavior_steps: 1000
  mechanism_steps: 400
  batch_size: 8
  lr: 0.0003
  weight_decay: 0.01
  max_prompt_len: 128
  interpreter_layers: 2
  interpreter_heads: 4
  dropout: 0.0

  # NEW: behavior evaluation modes
  behavior_objectives:
    - kl_distill
    - mcq_accuracy
    - topk_overlap

self_reflection:
  enabled: true

  modes:
    - self_probe_behavior
    - self_probe_mechanism
    - self_report_behavior
    - self_report_mechanism

  probe_arches:
    - linear
    - mlp

  probe_sizes: [64, 128]
  probe_steps: 400

  report_num_examples: 128
  report_max_new_tokens: 64

validation:
  min_rows_required: 50
  min_self_report_parse_rate: 0.7
  min_behavior_self_report_target_match: 0.2
  min_behavior_self_report_gold_match: 0.2
  min_mechanism_self_report_within_one: 0.4
  promote_only_validated_optional: true

outputs:
  root_dir: outputs
  run_name: full_paper_template
  save_checkpoints: false
  save_plots: true
  save_per_example_artifacts: true
  save_model_cards: true
  save_submission_bundle: true
  save_report_markdown: true
  save_paper_tables: true

stats:
  bootstrap_iterations: 1000
  confidence_level: 0.95
  fdr_method: bh

  primary_metrics:
    - mean_gap
    - p90_gap
    - frac_hard_heads

  secondary_metrics:
    - median_gap
    - hardest_gap
    - easiest_gap
    - mechanism_top1_match
    - behavior_top1_match
    - behavior_top5_overlap
    - mcq_accuracy

runtime:
  device: auto
  allow_fp16: true
  trust_remote_code: true
  compile_interpreters: false

  # low-memory frozen target options
  load_in_8bit: false
  load_in_4bit: false
  device_map: auto
  low_cpu_mem_usage: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: float16